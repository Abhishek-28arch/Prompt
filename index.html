<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="PromptCraft AI - An intelligent prompt engineering assistant powered by RAG and local Ollama AI. Learn and apply prompt engineering techniques.">
  <meta name="keywords" content="prompt engineering, AI, Claude, RAG, chain of thought, few-shot, prompting">
  <title>PromptCraft AI — Prompt Engineering Assistant</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Sidebar Overlay (Mobile) -->
  <div id="sidebar-overlay" class="sidebar-overlay"></div>

  <div class="app-layout">
    <!-- ======== SIDEBAR ======== -->
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <span class="logo-icon">⚡</span>
          <h1 class="logo-text">PromptCraft</h1>
        </div>
      </div>

      <div class="sidebar-content">
        <!-- Knowledge Topics -->
        <section class="sidebar-section">
          <div class="section-header">
            <h2 class="section-title">Knowledge Topics</h2>
            <span id="active-topics-count" class="badge">0/0 active</span>
          </div>
          <div class="section-actions">
            <button id="select-all-topics" class="text-btn" title="Select all">All</button>
            <button id="deselect-all-topics" class="text-btn" title="Deselect all">None</button>
          </div>
          <div id="topic-chips" class="topic-chips-container"></div>
        </section>

        <!-- Custom Knowledge -->
        <section class="sidebar-section">
          <div class="section-header">
            <h2 class="section-title">Custom Knowledge</h2>
          </div>
          <button id="add-knowledge-btn" class="add-knowledge-btn">
            <span class="btn-icon">+</span>
            <span>Add Knowledge</span>
          </button>
        </section>

        <!-- Conversation Memory -->
        <section class="sidebar-section">
          <div class="section-header">
            <h2 class="section-title">Memory</h2>
          </div>
          <div class="memory-info">
            <div class="memory-status">
              <span class="memory-icon">🧠</span>
              <span id="memory-count">0 messages</span>
            </div>
            <button id="clear-memory-btn" class="text-btn danger" style="display:none" title="Clear conversation history">Clear</button>
          </div>
        </section>
      </div>

      <div class="sidebar-footer">
        <div class="model-badge">
          <span class="model-dot"></span>
          <span id="model-name">claude-sonnet-4-20250514</span>
        </div>
      </div>
    </aside>

    <!-- ======== MAIN CONTENT ======== -->
    <main class="main-content">
      <!-- Top Bar -->
      <header class="top-bar">
        <button id="sidebar-toggle" class="sidebar-toggle" aria-label="Toggle sidebar">
          <svg viewBox="0 0 24 24" fill="currentColor" width="24" height="24">
            <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/>
          </svg>
        </button>
        <div class="top-bar-title">
          <h2>Chat</h2>
          <div id="ollama-status" class="api-key-status disconnected">
            <span class="status-dot status-disconnected"></span> Checking...
          </div>
        </div>
        <button id="settings-toggle" class="settings-toggle" aria-label="Settings">
          <svg viewBox="0 0 24 24" fill="currentColor" width="22" height="22">
            <path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.07,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/>
          </svg>
        </button>
      </header>

      <div id="settings-panel" class="settings-panel">
        <div class="settings-inner">
          <h3>Settings</h3>
          <div class="settings-group">
            <label for="model-select" class="settings-label">Ollama Model</label>
            <div class="model-select-wrapper">
              <select id="model-select" class="settings-select">
                <option disabled selected>Loading models...</option>
              </select>
              <button id="refresh-models-btn" class="refresh-btn" title="Refresh models">
                <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16">
                  <path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
                </svg>
              </button>
            </div>
            <p class="settings-hint">Select a locally installed Ollama model. Run <code>ollama pull &lt;model&gt;</code> to add more.</p>
          </div>
        </div>
      </div>

      <!-- Quick Prompts -->
      <div id="quick-prompts" class="quick-prompts"></div>

      <!-- Chat Messages -->
      <div id="chat-messages" class="chat-messages"></div>

      <!-- Input Area -->
      <div class="input-area">
        <div class="input-wrapper">
          <textarea
            id="message-input"
            class="message-input"
            placeholder="Ask about prompt engineering..."
            rows="1"
            aria-label="Type your message"
          ></textarea>
          <button id="send-btn" class="send-btn" disabled aria-label="Send message">
            <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
              <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
            </svg>
          </button>
        </div>
        <p class="input-hint">Press Enter to send · Shift+Enter for new line</p>
      </div>
    </main>
  </div>

  <!-- Custom Knowledge Modal -->
  <div id="custom-knowledge-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Add Custom Knowledge</h3>
        <button id="modal-close" class="modal-close" aria-label="Close">×</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="custom-title" class="form-label">Topic Title</label>
          <input type="text" id="custom-title" class="form-input" placeholder="e.g., Prompt Templates for Code Review">
        </div>
        <div class="form-group">
          <label for="custom-content" class="form-label">Knowledge Content</label>
          <textarea id="custom-content" class="form-textarea" rows="8" placeholder="Write your prompt engineering knowledge here. Use markdown for formatting."></textarea>
        </div>
        <div class="form-group">
          <label for="custom-tags" class="form-label">Tags <span class="optional">(comma-separated)</span></label>
          <input type="text" id="custom-tags" class="form-input" placeholder="e.g., code, review, templates">
        </div>
      </div>
      <div class="modal-footer">
        <button id="cancel-knowledge-btn" class="btn btn-secondary">Cancel</button>
        <button id="save-knowledge-btn" class="btn btn-primary">Add to Knowledge Base</button>
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toast-container" class="toast-container"></div>

  <!-- App Script -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
